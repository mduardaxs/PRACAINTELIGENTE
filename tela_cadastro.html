<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login | Praça Inteligente</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png"
    href="https://i.ibb.co/Nz68BSC/PRA-A-INTELIGENTE-LOGO.png">

  <!-- Animate.css -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow:hidden;
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:
      radial-gradient(circle at top left, #1b6ca8 0%, transparent 30%),
      radial-gradient(circle at bottom right, #0f4c75 0%, transparent 30%),
      linear-gradient(135deg, #071e3d, #0f4c75);
      color:white;
    }

    /* FUNDO */

    body::before{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      background:rgba(255,211,105,0.08);
      border-radius:50%;
      top:-120px;
      left:-120px;
      filter:blur(40px);
    }

    body::after{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      background:rgba(255,255,255,0.05);
      border-radius:50%;
      bottom:-100px;
      right:-100px;
      filter:blur(40px);
    }

    /* CARD */

    .login-container{
      position:relative;
      z-index:2;
      width:100%;
      max-width:430px;
      padding:40px 32px;
      border-radius:28px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:
      0 20px 60px rgba(0,0,0,0.35);
      animation:fadeInUp 1s ease;
    }

    /* LOGO */

    .logo{
      text-align:center;
      margin-bottom:30px;
    }

    .logo img{
      width:75px;
      margin-bottom:15px;
    }

    .logo h1{
      font-size:2rem;
      color:#ffd369;
    }

    .logo p{
      margin-top:10px;
      line-height:1.7;
      color:rgba(255,255,255,0.8);
      font-size:0.95rem;
    }

    /* INPUTS */

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:10px;
      color:#ffd369;
      font-weight:600;
    }

    .input-group input{
      width:100%;
      padding:16px 18px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.08);
      color:white;
      font-size:0.95rem;
      transition:0.3s ease;
    }

    .input-group input::placeholder{
      color:rgba(255,255,255,0.45);
    }

    .input-group input:focus{
      border-color:#ffd369;
      background:rgba(255,255,255,0.1);
      box-shadow:
      0 0 0 4px rgba(255,211,105,0.12);
    }

    /* SENHA */

    .senha-container{
      position:relative;
    }

    .senha-container input{
      padding-right:55px;
    }

    .toggle-password{
      position:absolute;
      right:18px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      font-size:1.1rem;
      color:rgba(255,255,255,0.7);
      transition:0.3s ease;
    }

    .toggle-password:hover{
      color:#ffd369;
    }

    /* BOTÃO */

    .btn{
      width:100%;
      margin-top:10px;
      padding:16px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      font-size:1rem;
      font-weight:700;
      color:#111;

      background:
      linear-gradient(135deg,#ffd369,#ffb703);
      transition:0.4s ease;
      box-shadow:
      0 10px 30px rgba(255,211,105,0.25);
    }

    .btn:hover{
      transform:translateY(-5px);
      box-shadow:
      0 15px 40px rgba(255,211,105,0.4);
    }

    /* TEXTO */

    .footer-text{
      margin-top:25px;
      text-align:center;
      color:rgba(255,255,255,0.7);
      font-size:0.95rem;
    }

    .footer-text a{
      color:#ffd369;
      text-decoration:none;
      font-weight:600;
    }

    .footer-text a:hover{
      text-decoration:underline;
    }

  </style>
</head>
<body>

  <div class="login-container animate__animated animate__fadeInUp">
    <div class="logo">
      <img src="https://i.ibb.co/Nz68BSC/PRA-A-INTELIGENTE-LOGO.png"
        alt="Logo Praça Inteligente">
      <h1>Login</h1>
      <p>
        Entre na plataforma e acompanhe
        os espaços públicos inteligentes.
      </p>
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label>E-mail</label>
        <input 
          type="email"
          id="email"
          placeholder="Digite seu e-mail"
          required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <div class="senha-container">
          <input 
            type="password"
            id="senha"
            placeholder="Digite sua senha"
            required>
          <span class="toggle-password" onclick="mostrarSenha()">
            👁
          </span>
        </div>
      </div>

      <button type="submit" class="btn">
        Entrar
      </button>
    </form>

    <div class="footer-text">
      Não possui conta?
      <a href="cadastro.html">
        Cadastre-se
      </a>
    </div>
  </div>
  <script>

    // MOSTRAR SENHA

    function mostrarSenha(){
      const senhaInput = document.getElementById("senha");
      if(senhaInput.type === "password"){
        senhaInput.type = "text";
      } else {
        senhaInput.type = "password";
      }
    }

    // LOGIN E REDIRECIONAMENTO

    document
      .getElementById("loginForm")
      .addEventListener("submit", function(event){

      event.preventDefault();

      const email = document
        .getElementById("email")
        .value;

      // ADMIN

      if(email.endsWith("@pracainteligente.com")){
        window.location.href = "admin.html";
      }

      // CIDADÃO

      else if(email.endsWith("@gmail.com")){
        window.location.href = "cidadao.html";
      }

      // EMAIL INVÁLIDO

      else{
        alert("E-mail não autorizado.");
      }
    });
  </script>
</body>
</html>
