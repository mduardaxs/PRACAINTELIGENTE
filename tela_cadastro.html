<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Praça Inteligente</title>
  <link rel="icon" type="image/png" href="https://i.ibb.co/Nz68BSC/PRA-A-INTELIGENTE-LOGO.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <style>
    /* ... (Seu CSS permanece o mesmo) ... */
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:radial-gradient(circle at top left, #1b6ca8 0%, transparent 30%), radial-gradient(circle at bottom right, #0f4c75 0%, transparent 30%), linear-gradient(135deg, #071e3d, #0f4c75);display:flex;justify-content:center;align-items:center;padding:40px 20px;color:white;overflow-x:hidden;}
    .cadastro-container{position:relative;z-index:2;width:100%;max-width:450px;padding:45px 35px;border-radius:28px;background:rgba(255,255,255,0.08);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 60px rgba(0,0,0,0.35);animation:fadeInUp 1s ease;}
    .logo{text-align:center;margin-bottom:25px;}
    .logo img{width:80px;margin-bottom:15px;}
    .logo h1{font-size:2rem;color:#ffd369;}
    .logo p{margin-top:10px;color:rgba(255,255,255,0.8);line-height:1.7;}
    .input-group{margin-bottom:20px;}
    .input-group label{display:block;margin-bottom:10px;font-weight:600;color:#ffd369;}
    .input-group input{width:100%;padding:16px 18px;border:none;outline:none;border-radius:14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.08);color:white;font-size:1rem;transition:0.3s ease;}
    .input-group input:focus{border-color:#ffd369;background:rgba(255,255,255,0.1);box-shadow:0 0 0 4px rgba(255,211,105,0.12);}
    .senha-container{position:relative;}
    .senha-container input{padding-right:55px;}
    .toggle-password{position:absolute;right:18px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.1rem;color:rgba(255,255,255,0.7);}
    .btn{width:100%;margin-top:10px;padding:18px;border:none;border-radius:16px;background:linear-gradient(135deg,#ffd369,#ffb703);color:#111;font-size:1rem;font-weight:700;cursor:pointer;transition:0.4s ease;box-shadow:0 10px 30px rgba(255,211,105,0.25);}
    .btn:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(255,211,105,0.4);}
    .footer-text{margin-top:25px;text-align:center;color:rgba(255,255,255,0.7);font-size:0.95rem;}
    .footer-text a{color:#ffd369;text-decoration:none;font-weight:600;}
  </style>
</head>

<body>
  <div class="cadastro-container animate__animated animate__fadeInUp">
    <div class="logo">
      <img src="https://i.ibb.co/Nz68BSC/PRA-A-INTELIGENTE-LOGO.png" alt="Logo">
      <h1>Praça Inteligente</h1>
      <p>Faça seu cadastro e participe da construção de cidades inteligentes.</p>
    </div>

    <form id="formCadastro">
      <div class="input-group">
        <label>Nome Completo</label>
        <input type="text" name="nome" placeholder="Digite seu nome completo" required>
      </div>

      <div class="input-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="Digite seu e-mail" required>
      </div>

      <div class="input-group">
        <label>CPF</label>
        <input type="text" name="cpf" placeholder="000.000.000-00" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <div class="senha-container">
          <input type="password" id="senha" name="senha" placeholder="Crie sua senha" required>
          <span class="toggle-password" onclick="mostrarSenha()">👁</span>
        </div>
      </div>

      <button type="submit" class="btn">Criar Cadastro</button>
    </form>

    <div class="footer-text">
      Já possui uma conta? <a href="login.html">Entrar agora</a>
    </div>
  </div>

  <script>
    // Função para mostrar/esconder senha
    function mostrarSenha(){
      const senhaInput = document.getElementById("senha");
      senhaInput.type = senhaInput.type === "password" ? "text" : "password";
    }

    // Lógica para o botão: Simula o cadastro e vai para o login
    document.getElementById('formCadastro').addEventListener('submit', function(e) {
      e.preventDefault(); // Impede o recarregamento da página
      
      // Aqui você poderia colocar a lógica de salvar no banco de dados futuramente
      alert("Cadastro realizado com sucesso! Redirecionando para o login...");
      
      window.location.href = "login.html"; // Redireciona para sua página de login
    });
  </script>
</body>
</html>
