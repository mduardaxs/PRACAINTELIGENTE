<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="PRAÇA INTELIGENTE LOGO.png">
    <title>Cadastro | Praça Inteligente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .custom-input { transition: all 0.3s ease; border: 1.5px solid #e2e8f0; }
        .custom-input:focus { border-color: #0095ff; box-shadow: 0 0 0 4px rgba(0, 149, 255, 0.1); outline: none; }
        .btn-gradient { background: #0095ff; transition: all 0.3s ease; }
        .btn-gradient:hover { background: #007ce2; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 149, 255, 0.3); }
        .logo-img { max-width: 170px; width: 100%; height: auto; object-fit: contain; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-card rounded-[40px] p-10 md:p-12 border border-gray-100">
        
        <div class="flex justify-center mb-8">
            <img src="https://i.ibb.co/Nz68BSC/PRA-A-INTELIGENTE-LOGO.png" alt="PRAÇA INTELIGENTE LOGO" class="logo-img">
        </div>

        <h2 class="text-center text-gray-400 text-sm font-medium mb-10 tracking-wide uppercase">Iniciar Sessão</h2>

        <form id="registrationForm" class="space-y-6">
            
            <div class="space-y-2">
                <label for="email" class="flex items-center gap-2 text-gray-700 font-medium ml-2">
                    <i class="far fa-envelope text-gray-800"></i>
                    <span>Email:</span>
                </label>
                <input type="email" id="email" name="email" class="w-full custom-input h-12 rounded-full px-6 text-gray-700" placeholder="exemplo@email.com" required>
            </div>

            <div class="space-y-2">
                <label for="password" class="flex items-center gap-2 text-gray-700 font-medium ml-2">
                    <i class="fas fa-key text-gray-800" style="transform: rotate(-45deg);"></i>
                    <span>Senha:</span>
                </label>
                <input type="password" id="password" name="password" class="w-full custom-input h-12 rounded-full px-6 text-gray-700" placeholder="••••••••" required>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full h-14 btn-gradient text-white font-semibold text-lg rounded-full shadow-lg">
                    Concluir
                </button>
            </div>
        </form>
    </div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(event) {
        event.preventDefault(); // Impede o envio padrão

        const emailInput = document.getElementById('email').value.toLowerCase();
        
        // Lógica de Redirecionamento
        if (emailInput.endsWith('@pracainteligente.com') || emailInput.endsWith('@pracainteligente')) {
            // Se terminar com o domínio da empresa, vai para o ADM
            alert("Acesso Administrativo detectado. Redirecionando...");
            window.location.href = "pagina_adm.html";
        } 
        else if (emailInput.endsWith('@gmail.com')) {
            // Se for Gmail, vai para o usuário comum
            alert("Acesso de Usuário detectado. Redirecionando...");
            window.location.href = "pagina_usuario.html";
        } 
        else {
            // Caso seja outro domínio, você pode decidir para onde mandar
            alert("Redirecionando para área de usuário...");
            window.location.href = "painel_usuario.html";
        }
    });
</script>
</body>
</html>
